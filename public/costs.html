<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Costos · Service CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h3 mb-0">Costos</h1>
      <button class="btn btn-primary" id="newBtn">+ Nuevo costo</button>
    </div>

    <div class="card p-3 mb-3">
      <div class="row g-2">
        <div class="col-md-4"><select id="f-category" class="form-select"><option value="">Todos los rubros</option></select></div>
        <div class="col-md-3"><input type="date" id="f-from" class="form-control" title="Desde" /></div>
        <div class="col-md-3"><input type="date" id="f-to" class="form-control" title="Hasta" /></div>
        <div class="col-md-2"><button class="btn btn-outline-secondary w-100" id="clearFilters">Limpiar</button></div>
      </div>
    </div>

    <div class="card p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Fecha</th>
              <th>Rubro</th>
              <th>Descripción</th>
              <th class="text-end">Monto</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="body"></tbody>
          <tfoot class="table-light">
            <tr>
              <th colspan="3" class="text-end">Total:</th>
              <th class="text-end money" id="totalSum">$0</th>
              <th></th>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </main>

  <div class="modal fade" id="costModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="costForm">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Nuevo costo</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id" />
            <div class="row g-2 mb-2">
              <div class="col-7">
                <label class="form-label">Fecha *</label>
                <input class="form-control" type="date" name="cost_date" required />
              </div>
              <div class="col-5">
                <label class="form-label">Monto</label>
                <input class="form-control" type="number" step="0.01" min="0" name="amount" />
              </div>
            </div>
            <div class="mb-2">
              <label class="form-label">Rubro *</label>
              <select class="form-select" name="category" required id="categorySelect"></select>
            </div>
            <div class="mb-2">
              <label class="form-label">Descripción</label>
              <textarea class="form-control" name="description" rows="2" placeholder="Ej: nafta camioneta, pinceles, etc."></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script>
    renderNav('costs');

    const modal = new bootstrap.Modal(document.getElementById('costModal'));
    const form = document.getElementById('costForm');
    let categories = [];

    async function init() {
      categories = await api('/api/costs/categories');
      const opts = categories.map(c => `<option value="${c}">${c}</option>`).join('');
      document.getElementById('categorySelect').innerHTML = opts;
      document.getElementById('f-category').innerHTML = '<option value="">Todos los rubros</option>' + opts;
      load();
    }

    document.getElementById('newBtn').addEventListener('click', () => {
      form.reset();
      form.id.value = '';
      form.cost_date.value = todayISO();
      document.getElementById('modalTitle').textContent = 'Nuevo costo';
      modal.show();
    });

    function currentFilters() {
      return {
        category: document.getElementById('f-category').value,
        from: document.getElementById('f-from').value,
        to: document.getElementById('f-to').value
      };
    }

    async function load() {
      const f = currentFilters();
      const qs = new URLSearchParams(Object.entries(f).filter(([,v]) => v !== '')).toString();
      const rows = await api('/api/costs' + (qs ? '?' + qs : ''));
      const body = document.getElementById('body');
      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="5" class="text-muted text-center p-4">Sin costos.</td></tr>';
        document.getElementById('totalSum').textContent = money(0);
        return;
      }
      body.innerHTML = rows.map(r => `
        <tr>
          <td>${fmtDate(r.cost_date)}</td>
          <td><span class="badge text-bg-secondary">${escapeHtml(r.category)}</span></td>
          <td><span class="text-muted">${escapeHtml(r.description || '')}</span></td>
          <td class="text-end money text-danger">- ${money(r.amount)}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-secondary edit" data-id="${r.id}">Editar</button>
            <button class="btn btn-sm btn-outline-danger del" data-id="${r.id}">Borrar</button>
          </td>
        </tr>
      `).join('');
      body.querySelectorAll('.edit').forEach(b => b.addEventListener('click', () => openEdit(b.dataset.id)));
      body.querySelectorAll('.del').forEach(b => b.addEventListener('click', () => del(b.dataset.id)));
      document.getElementById('totalSum').textContent = money(rows.reduce((a, r) => a + r.amount, 0));
    }

    async function openEdit(id) {
      const c = await api('/api/costs/' + id);
      form.id.value = c.id;
      form.cost_date.value = c.cost_date;
      form.category.value = c.category;
      form.description.value = c.description || '';
      form.amount.value = c.amount;
      document.getElementById('modalTitle').textContent = 'Editar costo';
      modal.show();
    }

    async function del(id) {
      if (!confirm('¿Borrar este costo?')) return;
      await api('/api/costs/' + id, { method: 'DELETE' });
      load();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form));
      const id = data.id;
      delete data.id;
      try {
        if (id) await api('/api/costs/' + id, { method: 'PUT', body: JSON.stringify(data) });
        else await api('/api/costs', { method: 'POST', body: JSON.stringify(data) });
        modal.hide();
        load();
      } catch (err) { alert(err.message); }
    });

    document.getElementById('clearFilters').addEventListener('click', () => {
      ['f-category','f-from','f-to'].forEach(id => document.getElementById(id).value = '');
      load();
    });
    ['f-category','f-from','f-to'].forEach(id =>
      document.getElementById(id).addEventListener('change', load)
    );

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]);
    }

    init().catch(err => alert(err.message));
  </script>
</body>
</html>
