<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clientes · Service CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h3 mb-0">Clientes</h1>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#clientModal" id="newBtn">+ Nuevo cliente</button>
    </div>

    <div class="mb-3">
      <input id="search" class="form-control" placeholder="Buscar por nombre, teléfono o email…" />
    </div>

    <div class="card p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Nombre</th>
              <th>Teléfono</th>
              <th>Email</th>
              <th class="text-end">Servicios</th>
              <th class="text-end">Facturado</th>
              <th class="text-end">Pendiente</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="clients-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal fade" id="clientModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="clientForm">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Nuevo cliente</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id" />
            <div class="mb-2"><label class="form-label">Nombre *</label><input class="form-control" name="name" required /></div>
            <div class="mb-2"><label class="form-label">Teléfono</label><input class="form-control" name="phone" /></div>
            <div class="mb-2"><label class="form-label">Email</label><input class="form-control" name="email" type="email" /></div>
            <div class="mb-2"><label class="form-label">Dirección</label><input class="form-control" name="address" /></div>
            <div class="mb-2">
              <label class="form-label">Ubicación (link de Google Maps)</label>
              <input class="form-control" name="map_url" type="url" placeholder="https://maps.app.goo.gl/..." />
              <div class="form-text">En Google Maps: botón Compartir → Copiar enlace, y pegalo acá.</div>
            </div>
            <div class="mb-2"><label class="form-label">Notas</label><textarea class="form-control" name="notes" rows="2"></textarea></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="detailTitle">Cliente</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="detailBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script>
    renderNav('clients');

    const modalEl = document.getElementById('clientModal');
    const modal = new bootstrap.Modal(modalEl);
    const detailModal = new bootstrap.Modal(document.getElementById('detailModal'));
    const form = document.getElementById('clientForm');

    document.getElementById('newBtn').addEventListener('click', () => {
      form.reset();
      form.id.value = '';
      document.getElementById('modalTitle').textContent = 'Nuevo cliente';
    });

    async function load() {
      const q = document.getElementById('search').value.trim();
      const rows = await api('/api/clients' + (q ? `?q=${encodeURIComponent(q)}` : ''));
      const body = document.getElementById('clients-body');
      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="7" class="text-muted text-center p-4">Sin clientes todavía.</td></tr>';
        return;
      }
      body.innerHTML = rows.map(c => `
        <tr>
          <td><a href="#" class="detail-link" data-id="${c.id}">${escapeHtml(c.name)}</a></td>
          <td>${escapeHtml(c.phone || '')}</td>
          <td>${escapeHtml(c.email || '')}</td>
          <td class="text-end">${c.services_count}</td>
          <td class="text-end money">${money(c.total_billed)}</td>
          <td class="text-end money ${c.total_pending > 0 ? 'text-danger' : 'text-muted'}">${money(c.total_pending)}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-secondary edit" data-id="${c.id}">Editar</button>
            <button class="btn btn-sm btn-outline-danger del" data-id="${c.id}">Borrar</button>
          </td>
        </tr>
      `).join('');

      body.querySelectorAll('.detail-link').forEach(a => a.addEventListener('click', (e) => {
        e.preventDefault();
        openDetail(a.dataset.id);
      }));
      body.querySelectorAll('.edit').forEach(b => b.addEventListener('click', () => openEdit(b.dataset.id)));
      body.querySelectorAll('.del').forEach(b => b.addEventListener('click', () => delClient(b.dataset.id)));
    }

    async function openEdit(id) {
      const c = await api('/api/clients/' + id);
      form.id.value = c.id;
      form.name.value = c.name || '';
      form.phone.value = c.phone || '';
      form.email.value = c.email || '';
      form.address.value = c.address || '';
      form.map_url.value = c.map_url || '';
      form.notes.value = c.notes || '';
      document.getElementById('modalTitle').textContent = 'Editar cliente';
      modal.show();
    }

    async function delClient(id) {
      if (!confirm('¿Borrar cliente y todos sus servicios?')) return;
      await api('/api/clients/' + id, { method: 'DELETE' });
      load();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form));
      const id = data.id;
      delete data.id;
      try {
        if (id) await api('/api/clients/' + id, { method: 'PUT', body: JSON.stringify(data) });
        else await api('/api/clients', { method: 'POST', body: JSON.stringify(data) });
        modal.hide();
        load();
      } catch (err) { alert(err.message); }
    });

    async function openDetail(id) {
      const c = await api('/api/clients/' + id);
      document.getElementById('detailTitle').textContent = c.name;
      const body = document.getElementById('detailBody');
      const total = c.services.reduce((a, s) => a + s.price, 0);
      const pending = c.services.filter(s => !s.paid).reduce((a, s) => a + s.price, 0);
      body.innerHTML = `
        <div class="mb-3 small text-muted">
          ${c.phone ? '📞 ' + escapeHtml(c.phone) + ' · ' : ''}
          ${c.email ? '✉️ ' + escapeHtml(c.email) + ' · ' : ''}
          ${c.address ? '📍 ' + escapeHtml(c.address) : ''}
        </div>
        ${c.map_url ? `<div class="mb-3"><a href="${escapeHtml(c.map_url)}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-primary">🗺️ Ver en Google Maps</a></div>` : ''}
        ${c.notes ? `<div class="alert alert-light small">${escapeHtml(c.notes)}</div>` : ''}
        <div class="row g-2 mb-3">
          <div class="col"><div class="card p-2"><div class="label small text-muted">Total facturado</div><div class="money fw-bold">${money(total)}</div></div></div>
          <div class="col"><div class="card p-2"><div class="label small text-muted">Pendiente</div><div class="money fw-bold text-danger">${money(pending)}</div></div></div>
          <div class="col"><div class="card p-2"><div class="label small text-muted">Servicios</div><div class="fw-bold">${c.services.length}</div></div></div>
        </div>
        <h6>Historial de servicios</h6>
        ${c.services.length === 0 ? '<p class="text-muted small">Sin servicios.</p>' : `
          <table class="table table-sm">
            <thead><tr><th>Fecha</th><th>Rubro</th><th>Descripción</th><th class="text-end">Precio</th><th>Estado</th></tr></thead>
            <tbody>
              ${c.services.map(s => `
                <tr>
                  <td>${fmtDate(s.service_date)}</td>
                  <td><span class="badge text-bg-${catBadgeColor(s.category)}">${s.category}</span></td>
                  <td>${escapeHtml(s.description || '')}</td>
                  <td class="text-end money">${money(s.price)}</td>
                  <td>${s.paid ? '<span class="badge text-bg-success">Pagado</span>' : '<span class="badge text-bg-warning">Pendiente</span>'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `}
        <a href="/services.html?client_id=${c.id}" class="btn btn-sm btn-primary">+ Agregar servicio</a>
      `;
      detailModal.show();
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]);
    }

    let searchT;
    document.getElementById('search').addEventListener('input', () => {
      clearTimeout(searchT);
      searchT = setTimeout(load, 250);
    });

    load().catch(err => alert(err.message));

    const params = new URLSearchParams(window.location.search);
    if (params.get('id')) openDetail(params.get('id'));
  </script>
</body>
</html>
