<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agenda · Service CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-head { font-weight: 600; font-size: .8rem; text-align: center; color: #6c757d; padding: 4px; text-transform: uppercase; }
    .cal-day {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 6px;
      min-height: 96px; padding: 6px; cursor: pointer; display: flex; flex-direction: column; gap: 2px;
    }
    .cal-day:hover { border-color: #0d6efd; }
    .cal-day.other-month { background: #f8f9fa; color: #adb5bd; }
    .cal-day.today { border: 2px solid #0d6efd; }
    .cal-day.selected { box-shadow: 0 0 0 3px rgba(13,110,253,.25); border-color: #0d6efd; }
    .cal-day-number { font-size: .8rem; font-weight: 600; }
    .cal-pill {
      font-size: .7rem; padding: 1px 5px; border-radius: 4px; background: #e7f1ff; color: #084298;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cal-pill.paid { background: #d1e7dd; color: #0f5132; }
    .cal-pill.pending { background: #fff3cd; color: #664d03; }
    .cal-more { font-size: .7rem; color: #6c757d; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h1 class="h3 mb-0">Agenda</h1>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-outline-secondary btn-sm" id="prevMonth">←</button>
        <strong id="monthLabel" style="min-width: 180px; text-align: center;"></strong>
        <button class="btn btn-outline-secondary btn-sm" id="nextMonth">→</button>
        <button class="btn btn-outline-primary btn-sm" id="todayBtn">Hoy</button>
        <button class="btn btn-primary btn-sm" id="newOnSelected">+ Agendar en el día</button>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-8">
        <div class="card p-3">
          <div class="calendar-grid mb-1" id="cal-head"></div>
          <div class="calendar-grid" id="cal-grid"></div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card p-3" style="position: sticky; top: 10px;">
          <h2 class="h6 mb-3" id="dayTitle">Seleccioná un día</h2>
          <div id="dayList" class="small text-muted">—</div>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal servicio (reusable) -->
  <div class="modal fade" id="svcModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="svcForm">
          <div class="modal-header">
            <h5 class="modal-title" id="svcModalTitle">Nuevo servicio</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id" />
            <div class="mb-2">
              <label class="form-label">Cliente *</label>
              <select class="form-select" name="client_id" required id="clientSelect"></select>
            </div>
            <div class="mb-2">
              <label class="form-label">Rubro *</label>
              <select class="form-select" name="category" required id="categorySelect"></select>
            </div>
            <div class="row g-2 mb-2">
              <div class="col-7">
                <label class="form-label">Fecha *</label>
                <input class="form-control" type="date" name="service_date" required />
              </div>
              <div class="col-5">
                <label class="form-label">Hora</label>
                <input class="form-control" type="time" name="service_time" />
              </div>
            </div>
            <div id="daySchedule" class="mb-2"></div>
            <div class="row g-2 mb-2" id="recurrenceRow">
              <div class="col-7">
                <label class="form-label">Repetir</label>
                <select class="form-select" name="recurrence">
                  <option value="">No repetir</option>
                  <option value="weekly">Semanal</option>
                  <option value="biweekly">Cada 2 semanas</option>
                  <option value="monthly">Mensual</option>
                </select>
              </div>
              <div class="col-5">
                <label class="form-label">Cantidad</label>
                <input class="form-control" type="number" name="occurrences" min="1" max="52" value="4" />
              </div>
              <div class="col-12"><div id="recurrencePreview" class="small text-muted"></div></div>
            </div>
            <div class="mb-2">
              <label class="form-label">Descripción</label>
              <textarea class="form-control" name="description" rows="2"></textarea>
            </div>
            <div class="mb-2">
              <label class="form-label">Precio</label>
              <input class="form-control" type="number" step="0.01" min="0" name="price" />
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="paid" id="paidChk" value="1" />
              <label class="form-check-label" for="paidChk">Ya está pagado</label>
            </div>
            <div id="photoSection"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/service-form.js"></script>
  <script>
    renderNav('agenda');

    let currentMonth = startOfMonth(new Date());
    let selectedDate = toISO(new Date());
    let monthServices = [];

    function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
    function toISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function parseISO(s) { return new Date(s + 'T00:00:00'); }
    const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const DOW_ES = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

    async function loadMonth() {
      const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
      const from = toISO(new Date(y, m, 1));
      const to = toISO(new Date(y, m + 1, 0));
      monthServices = await api(`/api/services?from=${from}&to=${to}&sort=asc`);
      document.getElementById('monthLabel').textContent = `${MONTHS_ES[m]} ${y}`;
      renderGrid();
      renderDay();
    }

    function renderGrid() {
      const head = document.getElementById('cal-head');
      head.innerHTML = DOW_ES.map(d => `<div class="cal-head">${d}</div>`).join('');

      const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
      const first = new Date(y, m, 1);
      // lunes = 0
      const startOffset = (first.getDay() + 6) % 7;
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const today = toISO(new Date());

      const cells = [];
      // días del mes anterior
      const prevMonthDays = new Date(y, m, 0).getDate();
      for (let i = startOffset - 1; i >= 0; i--) {
        const d = new Date(y, m - 1, prevMonthDays - i);
        cells.push({ date: toISO(d), otherMonth: true });
      }
      // días del mes
      for (let d = 1; d <= daysInMonth; d++) {
        cells.push({ date: toISO(new Date(y, m, d)), otherMonth: false });
      }
      // relleno
      while (cells.length % 7 !== 0) {
        const last = parseISO(cells[cells.length - 1].date);
        last.setDate(last.getDate() + 1);
        cells.push({ date: toISO(last), otherMonth: true });
      }

      const byDate = {};
      monthServices.forEach(s => { (byDate[s.service_date] = byDate[s.service_date] || []).push(s); });

      const grid = document.getElementById('cal-grid');
      grid.innerHTML = cells.map(c => {
        const items = byDate[c.date] || [];
        const classes = ['cal-day'];
        if (c.otherMonth) classes.push('other-month');
        if (c.date === today) classes.push('today');
        if (c.date === selectedDate) classes.push('selected');
        const day = parseISO(c.date).getDate();
        const visible = items.slice(0, 3);
        const more = items.length - visible.length;
        return `
          <div class="${classes.join(' ')}" data-date="${c.date}">
            <div class="cal-day-number">${day}</div>
            ${visible.map(s => `
              <div class="cal-pill ${s.paid ? 'paid' : 'pending'}" title="${escapeHtml(s.client_name)} · ${escapeHtml(s.category)}">
                ${s.service_time ? s.service_time + ' ' : ''}${escapeHtml(s.client_name)}
              </div>
            `).join('')}
            ${more > 0 ? `<div class="cal-more">+${more} más</div>` : ''}
          </div>
        `;
      }).join('');

      grid.querySelectorAll('.cal-day').forEach(el => {
        el.addEventListener('click', () => {
          selectedDate = el.dataset.date;
          renderGrid();
          renderDay();
        });
      });
    }

    function renderDay() {
      const items = monthServices.filter(s => s.service_date === selectedDate)
        .sort((a, b) => (a.service_time || '99:99').localeCompare(b.service_time || '99:99'));
      const d = parseISO(selectedDate);
      const label = `${DOW_ES[(d.getDay()+6)%7]} ${d.getDate()} de ${MONTHS_ES[d.getMonth()].toLowerCase()}`;
      document.getElementById('dayTitle').textContent = label;
      const list = document.getElementById('dayList');
      if (!items.length) {
        list.innerHTML = '<p class="text-muted small mb-2">Sin servicios.</p>' +
          '<button class="btn btn-sm btn-primary" id="newHere">+ Agendar acá</button>';
        document.getElementById('newHere').addEventListener('click', openNewOnSelected);
        return;
      }
      list.innerHTML = `
        <ul class="list-group list-group-flush">
          ${items.map(s => `
            <li class="list-group-item px-0">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="fw-semibold">
                    ${s.service_time ? `<span class="text-primary">${s.service_time}</span> · ` : '<span class="text-muted">— : —</span> · '}
                    ${escapeHtml(s.client_name)}
                  </div>
                  <div class="small">
                    <span class="badge text-bg-${catBadgeColor(s.category)}">${s.category}</span>
                    ${s.description ? ' · ' + escapeHtml(s.description) : ''}
                  </div>
                </div>
                <div class="text-end small">
                  <div class="money fw-bold">${money(s.price)}</div>
                  ${s.paid ? '<span class="badge text-bg-success">Pagado</span>' : '<span class="badge text-bg-warning">Pendiente</span>'}
                </div>
              </div>
              <div class="mt-1">
                <button class="btn btn-sm btn-outline-secondary edit-svc" data-id="${s.id}">Editar</button>
              </div>
            </li>
          `).join('')}
        </ul>
        <button class="btn btn-sm btn-primary mt-3" id="newHere">+ Agendar acá</button>
      `;
      list.querySelectorAll('.edit-svc').forEach(b => b.addEventListener('click', () => openEditSvc(Number(b.dataset.id))));
      document.getElementById('newHere').addEventListener('click', openNewOnSelected);
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]);
    }

    document.getElementById('prevMonth').addEventListener('click', () => {
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1);
      loadMonth();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
      loadMonth();
    });
    document.getElementById('todayBtn').addEventListener('click', () => {
      currentMonth = startOfMonth(new Date());
      selectedDate = toISO(new Date());
      loadMonth();
    });
    document.getElementById('newOnSelected').addEventListener('click', openNewOnSelected);

    async function openNewOnSelected() {
      await ServiceForm.openNew({ date: selectedDate });
    }
    async function openEditSvc(id) {
      await ServiceForm.openEdit(id);
    }

    ServiceForm.init({ onSaved: loadMonth });
    loadMonth().catch(err => alert(err.message));
  </script>
</body>
</html>
