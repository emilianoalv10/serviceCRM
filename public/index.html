<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · Service CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <h1 class="h3 mb-4">Dashboard</h1>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3">
          <div class="label">Clientes</div>
          <div class="value" id="stat-clients">–</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3">
          <div class="label">Servicios</div>
          <div class="value" id="stat-services">–</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3">
          <div class="label">Cobrado</div>
          <div class="value text-success money" id="stat-paid">–</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3">
          <div class="label">Pendiente <span class="text-secondary" style="text-transform:none; letter-spacing:0;">(este + próx. mes)</span></div>
          <div class="value text-danger money" id="stat-pending">–</div>
        </div>
      </div>
    </div>

    <div class="card p-3 mb-4">
      <h2 class="h6 text-muted mb-3">Resultado del mes <span class="text-secondary small fw-normal" id="month-range"></span></h2>
      <div id="month-result">Cargando…</div>
    </div>

    <div class="card p-3 mb-4">
      <h2 class="h6 text-muted mb-3">Comparación semanal</h2>
      <div id="weekly-compare">Cargando…</div>
    </div>

    <div class="row g-3">
      <div class="col-lg-6">
        <div class="card p-3">
          <h2 class="h6 text-muted">Por rubro</h2>
          <div id="by-category">Cargando…</div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card p-3">
          <h2 class="h6 text-muted">Últimos 12 meses</h2>
          <div id="by-month">Cargando…</div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card p-3">
          <h2 class="h6 text-muted">Top clientes</h2>
          <div id="top-clients">Cargando…</div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card p-3">
          <h2 class="h6 text-muted">Clientes con pagos pendientes</h2>
          <div id="pending-clients">Cargando…</div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script>
    renderNav('dashboard');

    async function load() {
      const d = await api('/api/analytics/summary');
      document.getElementById('stat-clients').textContent = d.totals.clients_count;
      document.getElementById('stat-services').textContent = d.totals.services_count;
      document.getElementById('stat-paid').textContent = money(d.totals.total_paid);
      document.getElementById('stat-pending').textContent = money(d.totals.total_pending);

      renderMonthResult(d.month_result);
      renderWeeklyCompare(d.weekly_compare);
      renderByCategory(d.by_category);
      renderByMonth(d.by_month);
      renderTopClients(d.top_clients);
      renderPendingClients(d.pending_clients);
    }

    function renderMonthResult(m) {
      const el = document.getElementById('month-result');
      const rangeEl = document.getElementById('month-range');
      if (!m) { el.innerHTML = '<p class="text-muted small mb-0">Sin datos.</p>'; return; }
      rangeEl.textContent = `(${fmtDate(m.from)} → ${fmtDate(m.to)})`;
      const resultBilled = m.result_billed;
      const resultPaid = m.result_paid;
      const colorBilled = resultBilled >= 0 ? 'text-success' : 'text-danger';
      const colorPaid = resultPaid >= 0 ? 'text-success' : 'text-danger';
      el.innerHTML = `
        <div class="row g-3">
          <div class="col-md-4">
            <div class="border rounded p-3 h-100">
              <div class="small text-muted">Mi parte del mes <span class="text-secondary">(precio × mi %)</span></div>
              <div class="h4 mb-0 money text-success mt-1">${money(m.my_share_billed)}</div>
              <div class="small text-muted mt-1">Ya cobrado: ${money(m.my_share_paid)}</div>
              <div class="small text-muted mt-1">Facturación bruta: ${money(m.income_billed)}</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="border rounded p-3 h-100">
              <div class="small text-muted">Gastos del mes</div>
              <div class="h4 mb-0 money text-danger mt-1">- ${money(m.costs)}</div>
              <div class="small text-muted mt-1"><a href="/costs.html">Ver detalle →</a></div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="border rounded p-3 h-100 ${resultBilled >= 0 ? 'border-success' : 'border-danger'}">
              <div class="small text-muted">Ganancia del mes <span class="text-secondary">(mi parte − gastos)</span></div>
              <div class="h4 mb-0 money ${colorBilled} mt-1">${resultBilled >= 0 ? '' : '- '}${money(Math.abs(resultBilled))}</div>
              <div class="small ${colorPaid} mt-1">En caja real (cobrado × % − gastos): ${resultPaid >= 0 ? '' : '- '}${money(Math.abs(resultPaid))}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderWeeklyCompare(w) {
      const el = document.getElementById('weekly-compare');
      if (!w) return el.innerHTML = '<p class="text-muted small mb-0">Sin datos.</p>';
      const tw = w.this_week, lw = w.last_week, lwp = w.last_week_to_same_dow, nw = w.next_week;
      const delta = tw.billed - lwp.billed;
      const pct = lwp.billed > 0 ? (delta / lwp.billed) * 100 : (tw.billed > 0 ? 100 : 0);
      const arrow = delta > 0 ? '▲' : delta < 0 ? '▼' : '=';
      const color = delta > 0 ? 'text-success' : delta < 0 ? 'text-danger' : 'text-muted';
      el.innerHTML = `
        <div class="row g-3">
          <div class="col-md-4">
            <div class="border rounded p-3 h-100">
              <div class="small text-muted">Semana pasada <span class="text-secondary">(${fmtDate(lw.from)} → ${fmtDate(lw.to)})</span></div>
              <div class="d-flex align-items-baseline gap-2 mt-1">
                <span class="h4 mb-0 money">${money(lw.billed)}</span>
                <span class="small text-muted">facturado</span>
              </div>
              <div class="small mt-1">
                <span class="text-success">Cobrado: ${money(lw.paid)}</span> ·
                <span class="text-muted">${lw.count} servicio${lw.count===1?'':'s'}</span>
              </div>
              <div class="small text-muted mt-1">Hasta el mismo día: ${money(lwp.billed)}</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="border rounded p-3 h-100 border-primary">
              <div class="small text-muted">Esta semana <span class="text-secondary">(${fmtDate(tw.from)} → hoy)</span></div>
              <div class="d-flex align-items-baseline gap-2 mt-1">
                <span class="h4 mb-0 money">${money(tw.billed)}</span>
                <span class="small text-muted">facturado</span>
              </div>
              <div class="small mt-1">
                <span class="text-success">Cobrado: ${money(tw.paid)}</span> ·
                <span class="text-muted">${tw.count} servicio${tw.count===1?'':'s'}</span>
              </div>
              <div class="small text-muted mt-1">Cierre semana (lun-dom proyectado): ${money(tw.billed_full)}</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="border rounded p-3 h-100">
              <div class="small text-muted">Próxima semana <span class="text-secondary">(${fmtDate(nw.from)} → ${fmtDate(nw.to)})</span></div>
              <div class="d-flex align-items-baseline gap-2 mt-1">
                <span class="h4 mb-0 money">${money(nw.billed)}</span>
                <span class="small text-muted">estimado</span>
              </div>
              <div class="small mt-1">
                <span class="text-muted">${nw.count} servicio${nw.count===1?'':'s'} agendado${nw.count===1?'':'s'}</span>
              </div>
              <div class="small text-muted mt-1">Ya cobrado por adelantado: ${money(nw.paid)}</div>
            </div>
          </div>
        </div>
        <div class="text-center mt-3">
          <span class="${color} fw-semibold">${arrow} ${money(Math.abs(delta))} ${delta >= 0 ? 'arriba' : 'abajo'}</span>
          <span class="text-muted small">esta semana vs. semana pasada al mismo día (${pct >= 0 ? '+' : ''}${pct.toFixed(0)}%)</span>
        </div>
      `;
    }

    function renderByCategory(rows) {
      const el = document.getElementById('by-category');
      if (!rows.length) return el.innerHTML = '<p class="text-muted small mb-0">Sin datos.</p>';
      const max = Math.max(...rows.map(r => r.total), 1);
      el.innerHTML = `
        <table class="table table-sm mb-0">
          <thead><tr><th>Rubro</th><th class="text-end">Servicios</th><th class="text-end">Total</th><th style="width:30%"></th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td><span class="badge text-bg-${catBadgeColor(r.category)} badge-cat">${r.category}</span></td>
                <td class="text-end">${r.count}</td>
                <td class="text-end money">${money(r.total)}</td>
                <td><div class="bar"><span style="width:${(r.total/max)*100}%"></span></div></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderByMonth(rows) {
      const el = document.getElementById('by-month');
      if (!rows.length) return el.innerHTML = '<p class="text-muted small mb-0">Sin datos.</p>';
      const max = Math.max(...rows.map(r => r.total), 1);
      el.innerHTML = `
        <table class="table table-sm mb-0">
          <thead><tr><th>Mes</th><th class="text-end">Servicios</th><th class="text-end">Facturado</th><th class="text-end">Cobrado</th><th style="width:25%"></th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${r.month}</td>
                <td class="text-end">${r.count}</td>
                <td class="text-end money">${money(r.total)}</td>
                <td class="text-end money text-success">${money(r.paid)}</td>
                <td><div class="bar"><span style="width:${(r.total/max)*100}%"></span></div></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderTopClients(rows) {
      const el = document.getElementById('top-clients');
      if (!rows.length) return el.innerHTML = '<p class="text-muted small mb-0">Sin datos.</p>';
      el.innerHTML = `
        <table class="table table-sm mb-0">
          <thead><tr><th>Cliente</th><th class="text-end">Servicios</th><th class="text-end">Total</th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td><a href="/clients.html?id=${r.id}">${r.name}</a></td>
                <td class="text-end">${r.services_count}</td>
                <td class="text-end money">${money(r.total_billed)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderPendingClients(rows) {
      const el = document.getElementById('pending-clients');
      if (!rows.length) return el.innerHTML = '<p class="text-success small mb-0">¡Sin pendientes!</p>';
      el.innerHTML = `
        <table class="table table-sm mb-0">
          <thead><tr><th>Cliente</th><th class="text-end">Pendientes</th><th class="text-end">Deuda</th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td><a href="/clients.html?id=${r.id}">${r.name}</a></td>
                <td class="text-end">${r.pending_count}</td>
                <td class="text-end money text-danger">${money(r.total_pending)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    load().catch(err => alert(err.message));
  </script>
</body>
</html>
