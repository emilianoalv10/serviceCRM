<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · Service CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <h1 class="h3 mb-4">Dashboard</h1>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3">
          <div class="label">Clientes</div>
          <div class="value" id="stat-clients">–</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3">
          <div class="label">Servicios</div>
          <div class="value" id="stat-services">–</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3">
          <div class="label">Cobrado</div>
          <div class="value text-success money" id="stat-paid">–</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3">
          <div class="label">Pendiente</div>
          <div class="value text-danger money" id="stat-pending">–</div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-6">
        <div class="card p-3">
          <h2 class="h6 text-muted">Por rubro</h2>
          <div id="by-category">Cargando…</div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card p-3">
          <h2 class="h6 text-muted">Últimos 12 meses</h2>
          <div id="by-month">Cargando…</div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card p-3">
          <h2 class="h6 text-muted">Top clientes</h2>
          <div id="top-clients">Cargando…</div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card p-3">
          <h2 class="h6 text-muted">Clientes con pagos pendientes</h2>
          <div id="pending-clients">Cargando…</div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script>
    renderNav('dashboard');

    async function load() {
      const d = await api('/api/analytics/summary');
      document.getElementById('stat-clients').textContent = d.totals.clients_count;
      document.getElementById('stat-services').textContent = d.totals.services_count;
      document.getElementById('stat-paid').textContent = money(d.totals.total_paid);
      document.getElementById('stat-pending').textContent = money(d.totals.total_pending);

      renderByCategory(d.by_category);
      renderByMonth(d.by_month);
      renderTopClients(d.top_clients);
      renderPendingClients(d.pending_clients);
    }

    function renderByCategory(rows) {
      const el = document.getElementById('by-category');
      if (!rows.length) return el.innerHTML = '<p class="text-muted small mb-0">Sin datos.</p>';
      const max = Math.max(...rows.map(r => r.total), 1);
      el.innerHTML = `
        <table class="table table-sm mb-0">
          <thead><tr><th>Rubro</th><th class="text-end">Servicios</th><th class="text-end">Total</th><th style="width:30%"></th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td><span class="badge text-bg-${catBadgeColor(r.category)} badge-cat">${r.category}</span></td>
                <td class="text-end">${r.count}</td>
                <td class="text-end money">${money(r.total)}</td>
                <td><div class="bar"><span style="width:${(r.total/max)*100}%"></span></div></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderByMonth(rows) {
      const el = document.getElementById('by-month');
      if (!rows.length) return el.innerHTML = '<p class="text-muted small mb-0">Sin datos.</p>';
      const max = Math.max(...rows.map(r => r.total), 1);
      el.innerHTML = `
        <table class="table table-sm mb-0">
          <thead><tr><th>Mes</th><th class="text-end">Servicios</th><th class="text-end">Facturado</th><th class="text-end">Cobrado</th><th style="width:25%"></th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${r.month}</td>
                <td class="text-end">${r.count}</td>
                <td class="text-end money">${money(r.total)}</td>
                <td class="text-end money text-success">${money(r.paid)}</td>
                <td><div class="bar"><span style="width:${(r.total/max)*100}%"></span></div></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderTopClients(rows) {
      const el = document.getElementById('top-clients');
      if (!rows.length) return el.innerHTML = '<p class="text-muted small mb-0">Sin datos.</p>';
      el.innerHTML = `
        <table class="table table-sm mb-0">
          <thead><tr><th>Cliente</th><th class="text-end">Servicios</th><th class="text-end">Total</th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td><a href="/clients.html?id=${r.id}">${r.name}</a></td>
                <td class="text-end">${r.services_count}</td>
                <td class="text-end money">${money(r.total_billed)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderPendingClients(rows) {
      const el = document.getElementById('pending-clients');
      if (!rows.length) return el.innerHTML = '<p class="text-success small mb-0">¡Sin pendientes!</p>';
      el.innerHTML = `
        <table class="table table-sm mb-0">
          <thead><tr><th>Cliente</th><th class="text-end">Pendientes</th><th class="text-end">Deuda</th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td><a href="/clients.html?id=${r.id}">${r.name}</a></td>
                <td class="text-end">${r.pending_count}</td>
                <td class="text-end money text-danger">${money(r.total_pending)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    load().catch(err => alert(err.message));
  </script>
</body>
</html>
