<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ingresar · Service CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-light">
  <div class="container" style="max-width: 420px; margin-top: 10vh;">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3 text-center">Service CRM</h1>
        <p class="text-muted text-center small">Ingresá con tu usuario</p>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input class="form-control" name="username" autocomplete="username" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" name="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary w-100" type="submit">Entrar</button>
          <div id="loginError" class="text-danger small mt-3 text-center" style="display:none;"></div>
        </form>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!r.ok) throw new Error((await r.json()).error || 'Error');
        window.location.href = '/';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
