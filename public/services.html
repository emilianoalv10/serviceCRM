<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Servicios · Service CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h3 mb-0">Servicios</h1>
      <button class="btn btn-primary" id="newBtn">+ Nuevo servicio</button>
    </div>

    <div class="card p-3 mb-3">
      <div class="row g-2">
        <div class="col-md-3"><select id="f-category" class="form-select"><option value="">Todos los rubros</option></select></div>
        <div class="col-md-3">
          <select id="f-paid" class="form-select">
            <option value="">Pagos: todos</option>
            <option value="0">Solo pendientes</option>
            <option value="1">Solo pagados</option>
          </select>
        </div>
        <div class="col-md-2"><input type="date" id="f-from" class="form-control" title="Desde" /></div>
        <div class="col-md-2"><input type="date" id="f-to" class="form-control" title="Hasta" /></div>
        <div class="col-md-2"><button class="btn btn-outline-secondary w-100" id="clearFilters">Limpiar</button></div>
      </div>
    </div>

    <div class="card p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Cliente</th>
              <th>Rubro</th>
              <th>Descripción</th>
              <th class="text-end">Precio</th>
              <th>Trabajo</th>
              <th>Pago</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="services-body"></tbody>
          <tfoot class="table-light">
            <tr>
              <th colspan="5" class="text-end">Totales:</th>
              <th class="text-end money" id="totalFiltered">$0</th>
              <th colspan="3" class="small text-muted" id="totalBreakdown"></th>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </main>

  <div class="modal fade" id="svcModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="svcForm">
          <div class="modal-header">
            <h5 class="modal-title" id="svcModalTitle">Nuevo servicio</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id" />
            <div class="mb-2">
              <label class="form-label">Cliente *</label>
              <select class="form-select" name="client_id" required id="clientSelect"></select>
            </div>
            <div class="mb-2">
              <label class="form-label">Rubro *</label>
              <select class="form-select" name="category" required id="categorySelect"></select>
            </div>
            <div class="row g-2 mb-2">
              <div class="col-7">
                <label class="form-label">Fecha *</label>
                <input class="form-control" type="date" name="service_date" required />
              </div>
              <div class="col-5">
                <label class="form-label">Hora</label>
                <input class="form-control" type="time" name="service_time" />
              </div>
            </div>
            <div id="daySchedule" class="mb-2"></div>
            <div class="row g-2 mb-2" id="recurrenceRow">
              <div class="col-7">
                <label class="form-label">Repetir</label>
                <select class="form-select" name="recurrence">
                  <option value="">No repetir</option>
                  <option value="weekly">Semanal</option>
                  <option value="biweekly">Cada 2 semanas</option>
                  <option value="monthly">Mensual</option>
                </select>
              </div>
              <div class="col-5">
                <label class="form-label">Cantidad</label>
                <input class="form-control" type="number" name="occurrences" min="1" max="52" value="4" />
              </div>
              <div class="col-12"><div id="recurrencePreview" class="small text-muted"></div></div>
            </div>
            <div class="mb-2">
              <label class="form-label">Descripción</label>
              <textarea class="form-control" name="description" rows="2"></textarea>
            </div>
            <div class="mb-2">
              <label class="form-label">Precio</label>
              <input class="form-control" type="number" step="0.01" min="0" name="price" />
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="paid" id="paidChk" value="1" />
              <label class="form-check-label" for="paidChk">Ya está pagado</label>
            </div>
            <div id="photoSection"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/service-form.js"></script>
  <script>
    renderNav('services');

    async function init() {
      const categories = await api('/api/services/categories');
      document.getElementById('f-category').innerHTML =
        '<option value="">Todos los rubros</option>' +
        categories.map(c => `<option value="${c}">${c}</option>`).join('');

      await ServiceForm.init({ onSaved: load });

      const params = new URLSearchParams(window.location.search);
      if (params.get('client_id')) {
        ServiceForm.openNew({ clientId: params.get('client_id') });
      }
      load();
    }

    function currentFilters() {
      return {
        category: document.getElementById('f-category').value,
        paid: document.getElementById('f-paid').value,
        from: document.getElementById('f-from').value,
        to: document.getElementById('f-to').value
      };
    }

    async function load() {
      const f = currentFilters();
      const qs = new URLSearchParams(Object.entries(f).filter(([,v]) => v !== '')).toString();
      const rows = await api('/api/services' + (qs ? '?' + qs : ''));
      const body = document.getElementById('services-body');
      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="9" class="text-muted text-center p-4">Sin servicios.</td></tr>';
        document.getElementById('totalFiltered').textContent = money(0);
        document.getElementById('totalBreakdown').textContent = '';
        return;
      }
      body.innerHTML = rows.map(s => `
        <tr>
          <td>${fmtDate(s.service_date)}</td>
          <td>${s.service_time ? '<span class="text-primary fw-semibold">' + s.service_time + '</span>' : '<span class="text-muted">—</span>'}</td>
          <td><a href="/clients.html?id=${s.client_id}">${escapeHtml(s.client_name)}</a></td>
          <td><span class="badge text-bg-${catBadgeColor(s.category)}">${s.category}</span></td>
          <td>${escapeHtml(s.description || '')}</td>
          <td class="text-end money">${money(s.price)}</td>
          <td>
            <button class="btn btn-sm ${s.completed ? 'btn-success' : 'btn-outline-secondary'} toggle-done" data-id="${s.id}">
              ${s.completed ? '✓ Realizado' : 'Agendado'}
            </button>
          </td>
          <td>
            <button class="btn btn-sm ${s.paid ? 'btn-success' : 'btn-outline-warning'} toggle" data-id="${s.id}">
              ${s.paid ? 'Pagado' : 'Pendiente'}
            </button>
          </td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-secondary edit" data-id="${s.id}">Editar</button>
            <button class="btn btn-sm btn-outline-danger del" data-id="${s.id}">Borrar</button>
          </td>
        </tr>
      `).join('');

      body.querySelectorAll('.toggle').forEach(b => b.addEventListener('click', () => togglePaid(b.dataset.id)));
      body.querySelectorAll('.toggle-done').forEach(b => b.addEventListener('click', () => toggleDone(b.dataset.id)));
      body.querySelectorAll('.edit').forEach(b => b.addEventListener('click', () => ServiceForm.openEdit(Number(b.dataset.id))));
      body.querySelectorAll('.del').forEach(b => b.addEventListener('click', () => del(b.dataset.id)));

      const total = rows.reduce((a, s) => a + s.price, 0);
      const paid = rows.filter(s => s.paid).reduce((a, s) => a + s.price, 0);
      const pending = total - paid;
      document.getElementById('totalFiltered').textContent = money(total);
      document.getElementById('totalBreakdown').textContent = `Cobrado: ${money(paid)} · Pendiente: ${money(pending)}`;
    }

    async function togglePaid(id) {
      await api(`/api/services/${id}/toggle-paid`, { method: 'POST' });
      load();
    }

    async function toggleDone(id) {
      await api(`/api/services/${id}/toggle-completed`, { method: 'POST' });
      load();
    }

    async function del(id) {
      if (!confirm('¿Borrar este servicio?')) return;
      await api('/api/services/' + id, { method: 'DELETE' });
      load();
    }

    document.getElementById('newBtn').addEventListener('click', () => ServiceForm.openNew());
    document.getElementById('clearFilters').addEventListener('click', () => {
      ['f-category','f-paid','f-from','f-to'].forEach(id => document.getElementById(id).value = '');
      load();
    });
    ['f-category','f-paid','f-from','f-to'].forEach(id =>
      document.getElementById(id).addEventListener('change', load)
    );

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]);
    }

    init().catch(err => alert(err.message));
  </script>
</body>
</html>
