<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Empleados · Service CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h3 mb-0">Empleados</h1>
      <button class="btn btn-primary" id="newBtn">+ Nuevo empleado</button>
    </div>

    <div class="card p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Nombre</th>
              <th>Rol</th>
              <th>Teléfono</th>
              <th class="text-end">Servicios</th>
              <th>Estado</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal fade" id="empModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="empForm">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Nuevo empleado</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id" />
            <div class="mb-2"><label class="form-label">Nombre *</label><input class="form-control" name="name" required /></div>
            <div class="mb-2"><label class="form-label">Rol</label><input class="form-control" name="role" placeholder="Ej: Pintor, Jardinero, Limpieza" /></div>
            <div class="mb-2">
              <label class="form-label">Teléfono (WhatsApp)</label>
              <input class="form-control" name="phone" placeholder="Ej: 5491123456789" />
              <div class="form-text">Con código de país y sin espacios para que WhatsApp funcione (AR: 549 + área + número).</div>
            </div>
            <div class="mb-2"><label class="form-label">Notas</label><textarea class="form-control" name="notes" rows="2"></textarea></div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="active" id="activeChk" value="1" checked />
              <label class="form-check-label" for="activeChk">Activo</label>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script>
    renderNav('employees');

    const modal = new bootstrap.Modal(document.getElementById('empModal'));
    const form = document.getElementById('empForm');

    document.getElementById('newBtn').addEventListener('click', () => {
      form.reset();
      form.id.value = '';
      form.active.checked = true;
      document.getElementById('modalTitle').textContent = 'Nuevo empleado';
      modal.show();
    });

    async function load() {
      const rows = await api('/api/employees');
      const body = document.getElementById('body');
      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="6" class="text-muted text-center p-4">Sin empleados cargados.</td></tr>';
        return;
      }
      body.innerHTML = rows.map(e => `
        <tr${e.active ? '' : ' class="text-muted"'}>
          <td>${escapeHtml(e.name)}</td>
          <td>${escapeHtml(e.role || '')}</td>
          <td>${escapeHtml(e.phone || '')}</td>
          <td class="text-end">${e.services_count}</td>
          <td>${e.active ? '<span class="badge text-bg-success">Activo</span>' : '<span class="badge text-bg-secondary">Inactivo</span>'}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-secondary edit" data-id="${e.id}">Editar</button>
            <button class="btn btn-sm btn-outline-danger del" data-id="${e.id}">Borrar</button>
          </td>
        </tr>
      `).join('');
      body.querySelectorAll('.edit').forEach(b => b.addEventListener('click', () => openEdit(b.dataset.id)));
      body.querySelectorAll('.del').forEach(b => b.addEventListener('click', () => del(b.dataset.id)));
    }

    async function openEdit(id) {
      const e = await api('/api/employees/' + id);
      form.id.value = e.id;
      form.name.value = e.name || '';
      form.role.value = e.role || '';
      form.phone.value = e.phone || '';
      form.notes.value = e.notes || '';
      form.active.checked = !!e.active;
      document.getElementById('modalTitle').textContent = 'Editar empleado';
      modal.show();
    }

    async function del(id) {
      if (!confirm('¿Borrar empleado? Los servicios asignados quedarán sin empleado (no se borran).')) return;
      await api('/api/employees/' + id, { method: 'DELETE' });
      load();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const data = Object.fromEntries(fd);
      data.active = fd.get('active') ? 1 : 0;
      const id = data.id;
      delete data.id;
      try {
        if (id) await api('/api/employees/' + id, { method: 'PUT', body: JSON.stringify(data) });
        else await api('/api/employees', { method: 'POST', body: JSON.stringify(data) });
        modal.hide();
        load();
      } catch (err) { alert(err.message); }
    });

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]);
    }

    load().catch(err => alert(err.message));
  </script>
</body>
</html>
